name: Trading Bot

on:
  schedule:
    - cron: '30 3 * * 1-5'      # 9:00 AM IST
    - cron: '20 9 * * 1-5'      # 2:50 PM IST
    - cron: '47 16 * * 1-5'     # 10:17 PM IST (16:47 UTC)    
  workflow_dispatch:

# ── Grant the workflow write access so it can push the cache back ──────────────
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 359

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN (write permissions granted above)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyperclip pandas requests selenium webdriver-manager beautifulsoup4
        
      - name: Run trading bot
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          UPSTOX_API_KEY:      ${{ secrets.UPSTOX_API_KEY }}
          UPSTOX_API_SECRET:   ${{ secrets.UPSTOX_API_SECRET }}
          UPSTOX_EMAIL:        ${{ secrets.UPSTOX_EMAIL }}
          UPSTOX_EMAIL_PWD:    ${{ secrets.UPSTOX_EMAIL_PWD }}
          UPSTOX_MOBILE:       ${{ secrets.UPSTOX_MOBILE }}
          UPSTOX_PASSCODE:     ${{ secrets.UPSTOX_PASSCODE }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TEST_MODE:           "false"
        run: |
          echo "=== Bot starting at $(date '+%Y-%m-%d %H:%M:%S %Z') ==="
          python Both4withcache9_fIxed.py 2>&1 | tee bot_run.log
          echo "=== Bot finished at $(date '+%Y-%m-%d %H:%M:%S %Z') ==="

      # ── Option B: commit candle_cache/ back to the repository ─────────────
      - name: Commit candle cache to repository
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add candle_cache/ cache_stats.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ Candle cache unchanged — nothing to commit."
          else
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: update candle_cache [$TIMESTAMP]"
            git push
            echo "✅ Candle cache committed and pushed."
          fi
      # ──────────────────────────────────────────────────────────────────────

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_id }}
          path: |
            bot_run.log
            r3_live_alerts.csv
            gap_trading_alerts.csv
            exits_log.csv
            positions_tracking.csv
          retention-days: 7
